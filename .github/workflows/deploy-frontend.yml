name: Deploy Frontend to S3

on:
  push:
    branches: [ main ]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
      AWS_FRONTEND_BUCKET: ${{ vars.AWS_FRONTEND_BUCKET || secrets.AWS_FRONTEND_BUCKET }}
      AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN || secrets.AWS_DEPLOY_ROLE_ARN }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Validate deploy configuration
        shell: bash
        run: |
          missing=()
          [[ -n "$AWS_REGION" ]] || missing+=("AWS_REGION")
          [[ -n "$AWS_FRONTEND_BUCKET" ]] || missing+=("AWS_FRONTEND_BUCKET")
          [[ -n "$AWS_DEPLOY_ROLE_ARN" ]] || missing+=("AWS_DEPLOY_ROLE_ARN")

          if (( ${#missing[@]} > 0 )); then
            echo "Missing GitHub repository variables/secrets: ${missing[*]}" >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-frontend-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync files to S3
        run: |
          aws s3 sync dist s3://$S3_BUCKET_NAME --delete
        env:
          S3_BUCKET_NAME: ${{ env.AWS_FRONTEND_BUCKET }}
