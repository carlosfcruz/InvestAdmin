services:
  dynamodb-local:
    image: "amazon/dynamodb-local:latest"
    container_name: investadmin-dynamodb
    ports:
      - "8000:8000"
    volumes:
      - ./.docker/dynamodb:/home/dynamodblocal/data
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/8000'"]
      interval: 5s
      timeout: 5s
      retries: 5
